<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NONMEM-Ready 데이터 전처리 체크리스트 v7.1 — 34 Steps</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e13;
  --surface: #14171e;
  --surface-raised: #1a1e28;
  --surface-hover: #1f2432;
  --border: #2a2f3d;
  --border-active: #3d4456;
  --text: #e2e4e9;
  --text-dim: #8b90a0;
  --text-muted: #5c6172;
  --accent: #5b9ef5;
  --accent-dim: #3a6db8;
  --gate: #f59e0b;
  --gate-bg: rgba(245,158,11,0.08);
  --gate-border: rgba(245,158,11,0.25);
  --green: #34d399;
  --green-bg: rgba(52,211,153,0.08);
  --green-border: rgba(52,211,153,0.25);
  --red: #f87171;
  --orange: #fb923c;
  --phase0: #8b5cf6;
  --phase1: #3b82f6;
  --phase2: #06b6d4;
  --phase3: #10b981;
  --phase4: #f59e0b;
  --phase5: #ef4444;
  --phase6: #ec4899;
  --phase7: #8b5cf6;
  --phase8: #6366f1;
  --pkg: #a78bfa;
  --radius: 8px;
  --radius-lg: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'IBM Plex Sans', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  min-height: 100vh;
}

.container {
  max-width: 920px;
  margin: 0 auto;
  padding: 32px 20px 80px;
}

/* ── Header ── */
.header {
  text-align: center;
  margin-bottom: 40px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--border);
}

.header-badge {
  display: inline-block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: var(--accent);
  background: rgba(91,158,245,0.08);
  border: 1px solid rgba(91,158,245,0.2);
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 16px;
  text-transform: uppercase;
}

.header h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}

.header .subtitle {
  font-size: 14px;
  color: var(--text-dim);
  font-weight: 400;
}

/* ── Progress Bar ── */
.progress-container {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(12,14,19,0.92);
  backdrop-filter: blur(12px);
  padding: 12px 0;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--border);
}

.progress-inner {
  max-width: 920px;
  margin: 0 auto;
  padding: 0 20px;
}

.progress-stats {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.progress-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
}

.progress-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--surface-raised);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 3px;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
}

/* ── Phase Sections ── */
.phase {
  margin-bottom: 32px;
}

.phase-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}

.phase-header:hover {
  background: var(--surface-raised);
}

.phase-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 3px 10px;
  border-radius: 4px;
  white-space: nowrap;
}

.phase-title {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
}

.phase-progress {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
}

.phase-chevron {
  color: var(--text-muted);
  transition: transform 0.2s;
  font-size: 14px;
}

.phase.collapsed .phase-chevron {
  transform: rotate(-90deg);
}

.phase.collapsed .phase-body {
  display: none;
}

/* Phase colors */
.phase-0 .phase-tag { background: rgba(139,92,246,0.15); color: var(--phase0); }
.phase-1 .phase-tag { background: rgba(59,130,246,0.15); color: var(--phase1); }
.phase-2 .phase-tag { background: rgba(6,182,212,0.15); color: var(--phase2); }
.phase-3 .phase-tag { background: rgba(16,185,129,0.15); color: var(--phase3); }
.phase-4 .phase-tag { background: rgba(245,158,11,0.15); color: var(--phase4); }
.phase-5 .phase-tag { background: rgba(239,68,68,0.15); color: var(--phase5); }
.phase-6 .phase-tag { background: rgba(236,72,153,0.15); color: var(--phase6); }
.phase-7 .phase-tag { background: rgba(139,92,246,0.15); color: var(--phase7); }
.phase-8 .phase-tag { background: rgba(99,102,241,0.15); color: var(--phase8); }

/* ── Question Cards ── */
.question {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  transition: border-color 0.2s, background 0.2s;
  overflow: hidden;
}

.question:hover {
  border-color: var(--border-active);
}

.question.checked {
  border-color: var(--green-border);
  background: var(--green-bg);
}

.question.is-gate {
  border-color: var(--gate-border);
  background: var(--gate-bg);
}

.question.is-gate.checked {
  border-color: var(--green-border);
  background: var(--green-bg);
}

.q-main {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
}

.q-check {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  margin-top: 1px;
  border: 2px solid var(--border-active);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  background: transparent;
}

.question.checked .q-check {
  background: var(--green);
  border-color: var(--green);
}

.question.checked .q-check::after {
  content: '✓';
  color: var(--bg);
  font-size: 13px;
  font-weight: 700;
}

.question.is-gate .q-check {
  border-color: var(--gate);
  border-radius: 50%;
}

.question.is-gate.checked .q-check {
  background: var(--gate);
  border-color: var(--gate);
}

.q-content { flex: 1; min-width: 0; }

.q-top {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}

.q-number {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
}

.q-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}

.gate-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--gate);
  background: rgba(245,158,11,0.12);
  border: 1px solid rgba(245,158,11,0.3);
  padding: 1px 8px;
  border-radius: 3px;
}

.q-desc {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.6;
}

.q-details {
  padding: 0 16px 14px 48px;
}

.q-detail-toggle {
  font-size: 12px;
  color: var(--accent-dim);
  cursor: pointer;
  user-select: none;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 0;
  transition: color 0.15s;
}

.q-detail-toggle:hover {
  color: var(--accent);
}

.q-detail-body {
  display: none;
  margin-top: 8px;
}

.q-detail-body.open {
  display: block;
}

/* Code blocks */
.code-block {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  line-height: 1.7;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 14px;
  margin: 8px 0;
  overflow-x: auto;
  color: var(--text-dim);
  white-space: pre-wrap;
  word-break: break-all;
}

.code-block .cm { color: #6b7280; }
.code-block .fn { color: #93c5fd; }
.code-block .str { color: #86efac; }
.code-block .kw { color: #c4b5fd; }
.code-block .op { color: #fca5a5; }

/* Package tags */
.pkg-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.pkg-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--pkg);
  background: rgba(167,139,250,0.08);
  border: 1px solid rgba(167,139,250,0.2);
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
}

.pkg-tag::before {
  content: '📦 ';
}

/* Decision table */
.decision-table {
  width: 100%;
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 12px;
}

.decision-table th {
  text-align: left;
  padding: 6px 10px;
  background: var(--bg);
  color: var(--text-dim);
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.decision-table td {
  padding: 6px 10px;
  border-bottom: 1px solid rgba(42,47,61,0.5);
  color: var(--text-dim);
}

.decision-table tr:last-child td {
  border-bottom: none;
}

/* Warn/Note callouts */
.callout {
  font-size: 12px;
  padding: 8px 12px;
  border-radius: 6px;
  margin: 8px 0;
  line-height: 1.6;
}

.callout-warn {
  background: rgba(245,158,11,0.06);
  border-left: 3px solid var(--gate);
  color: var(--orange);
}

.callout-danger {
  background: rgba(239,68,68,0.06);
  border-left: 3px solid var(--red);
  color: var(--red);
}

.callout-info {
  background: rgba(91,158,245,0.06);
  border-left: 3px solid var(--accent);
  color: var(--accent);
}

/* ── Footer ── */
.footer {
  text-align: center;
  padding-top: 32px;
  margin-top: 40px;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 12px;
}

.reset-btn {
  display: inline-block;
  margin-top: 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--red);
  background: rgba(239,68,68,0.06);
  border: 1px solid rgba(239,68,68,0.2);
  padding: 6px 16px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}

.reset-btn:hover {
  background: rgba(239,68,68,0.12);
  border-color: rgba(239,68,68,0.4);
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .container { padding: 20px 12px 60px; }
  .header h1 { font-size: 20px; }
  .q-details { padding-left: 36px; }
  .q-main { padding: 12px; gap: 10px; }
}
</style>
</head>
<body>

<div class="progress-container">
  <div class="progress-inner">
    <div class="progress-stats">
      <span class="progress-label">전체 진행률</span>
      <span class="progress-count" id="progressCount">0 / 34</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>
</div>

<div class="container">

<div class="header">
  <div class="header-badge">v7.1 — 34 Steps · 8 Phases · 3 Gates</div>
  <h1>NONMEM-Ready 데이터 전처리 체크리스트</h1>
  <p class="subtitle">Protocol → Data → Model 계약서 — 임상 현실 재구성의 전 과정</p>
</div>

<div id="phases"></div>

<div class="footer">
  <div>NONMEM-Ready Preprocessing Checklist v7.1 · 34Q · AIMS BioScience</div>
  <div style="margin-top:4px;">Based on Uppsala / FDA / ICH-E9 Gold Standard</div>
  <button class="reset-btn" onclick="resetAll()">전체 초기화</button>
</div>

</div>

<script>
const DATA = [
  {
    phase: 0,
    tag: "P0",
    title: "Protocol & Data Inventory",
    subtitle: "사전 준비 — 데이터를 열기 전에",
    questions: [
      {
        id: "q01",
        title: "약물 특성 파악",
        desc: "반감기, 투여 경로(IV/oral/SC), 단회/다중 투여, 알려진 DDI·음식 효과 확인 → TIME 오류 허용 범위, RATE/ADDL 코딩 방식, 별도 플래그 필요 여부 결정",
        detail: `<div class="callout callout-info">핵심 질문: 이 약의 t½은? → |actual−nominal| > t½×0.1이면 actual time 사용 가치 있음</div>
<table class="decision-table">
<tr><th>확인 항목</th><th>결정 사항</th></tr>
<tr><td>반감기</td><td>TIME 오류 허용 범위</td></tr>
<tr><td>투여 경로</td><td>RATE, CMT 코딩</td></tr>
<tr><td>다중 투여 여부</td><td>SS, II, ADDL 필요 여부</td></tr>
<tr><td>DDI / 음식 효과</td><td>별도 플래그 변수</td></tr>
</table>`,
        pkgs: ["—"]
      },
      {
        id: "q02",
        title: "Protocol · CRF · SAP 통독",
        desc: "투여 스케줄, 방문일, 채혈 시점, dose modification 규칙 파악. 데이터는 프로토콜의 불완전한 구현물 — 프로토콜이 ground truth",
        detail: `<div class="callout callout-warn">⚠ 프로토콜을 먼저 읽지 않으면 이상값이 '오류'인지 '임상 현실'인지 구분 불가</div>
<div class="code-block"><span class="cm"># 확인 우선순위</span>
1. 투여 스케줄 (fixed dose? weight-based?)
2. PK 채혈 time window (nominal ± 허용 범위)
3. Dose reduction/interruption 규칙
4. Baseline 정의 (Screening vs Day 1)</div>`,
        pkgs: ["—"]
      },
      {
        id: "q03",
        title: "Raw Data Inventory",
        desc: "str(), dim(), names(), 결측 분포, 날짜 범위, 단위(mg vs μg, ng/mL vs μg/L) — 변수별 현실성 검토",
        detail: `<div class="code-block"><span class="fn">str</span>(rawdata)
<span class="fn">dim</span>(rawdata)
<span class="fn">sapply</span>(rawdata, <span class="kw">function</span>(x) <span class="fn">sum</span>(<span class="fn">is.na</span>(x)))
<span class="fn">table</span>(rawdata$STUDYID)
<span class="fn">range</span>(rawdata$DATE, <span class="kw">na.rm</span>=TRUE)
<span class="cm"># 날짜 범위가 현실적인가?</span></div>`,
        pkgs: ["dplyr", "readr", "haven"]
      },
      {
        id: "q04",
        title: "Data Dictionary 대조",
        desc: "코드값·변수명이 실제 데이터와 일치하는지, 대상자 수가 프로토콜 예정 수와 부합하는지 확인",
        detail: `<div class="code-block"><span class="cm"># 코드값 대조</span>
<span class="fn">table</span>(rawdata$ROUTE)   <span class="cm"># 프로토콜과 일치?</span>
<span class="fn">n_distinct</span>(rawdata$SUBJID)  <span class="cm"># 예정 N vs 실제 N</span>
<span class="fn">anti_join</span>(dict_expected, rawdata_cols)  <span class="cm"># 누락 변수</span></div>`,
        pkgs: ["dplyr", "janitor"]
      }
    ]
  },
  {
    phase: 1,
    tag: "P1",
    title: "Dosing Records",
    subtitle: "투여 기록 구축",
    questions: [
      {
        id: "q05",
        title: "EVID · AMT 설계",
        desc: "투여 경로별 EVID 코딩(1/2/3/4), AMT 단위 통일(mg 권장), 모든 투여 record의 DV=0 또는 '.'",
        detail: `<table class="decision-table">
<tr><th>EVID</th><th>의미</th><th>용도</th></tr>
<tr><td>1</td><td>투여 기록</td><td>dose event</td></tr>
<tr><td>0</td><td>관측값</td><td>DV 기록</td></tr>
<tr><td>2</td><td>Other type</td><td>공변량 변화 등</td></tr>
<tr><td>3</td><td>Reset</td><td>모든 상태변수 → 0</td></tr>
<tr><td>4</td><td>Reset + Dose</td><td>새 투여 사이클 시작</td></tr>
</table>
<div class="callout callout-warn">⚠ 투여 record에서 MDV=1 필수 — EVID=1이면 NONMEM이 DV를 무시하지만, MDV=1을 명시해야 안전</div>`,
        pkgs: ["dplyr", "tidyr"]
      },
      {
        id: "q06",
        title: "RATE 설정",
        desc: "IV bolus → RATE=0, IV infusion → RATE=dose/duration(양수), Oral → RATE=0. 음수 RATE는 $MODEL RATE 지정 시에만",
        detail: `<div class="code-block"><span class="cm"># RATE 코딩 규칙</span>
IV bolus:    RATE = 0  (또는 생략)
IV infusion: RATE = AMT / DURATION  (양수)
Oral:        RATE = 0

<span class="cm"># Duration으로 지정하고 싶을 때:</span>
RATE = <span class="op">-2</span>  →  $MODEL에서 D1 추정
<span class="cm"># 이 경우 DUR 컬럼에 infusion 시간 기입</span></div>`,
        pkgs: ["dplyr"]
      },
      {
        id: "q07",
        title: "CMT 설계 — 모델-데이터 계약",
        desc: "모델 구조(compartment 수, 흡수 모델)에 따라 CMT 번호 배정. Oral→Depot(CMT=1), IV→Central(CMT=2). 이 계약이 틀리면 NONMEM은 에러 없이 잘못된 결과 산출",
        detail: `<div class="code-block"><span class="cm"># Oral 2-compartment 기준:</span>
CMT=1  Depot (흡수 구획) — oral 투여
CMT=2  Central — IV 투여 + 모든 PK 관측
CMT=3  Peripheral

<span class="cm"># IV + Oral 병용 연구:</span>
Oral dose  → CMT=1 (Depot)
IV dose    → CMT=2 (Central)
PK sample  → CMT=2 (Central)</div>
<div class="callout callout-danger">⚠ Oral 투여를 CMT=2로 넣으면 흡수 과정 없이 Central에 직접 투입 → PRED 과대추정. NONMEM은 에러를 내지 않아 발견이 어려움</div>`,
        pkgs: ["dplyr"]
      },
      {
        id: "q08",
        title: "ADDL / II 결정",
        desc: "ADDL+II는 '완전히 균일한 기간'에만 적용. Dose reduction, 투여 시각 변동, time-varying 공변량 변화가 있으면 개별 record가 안전",
        detail: `<div class="callout callout-danger">⚠ ADDL 적용 전제조건 — 하나라도 위반하면 개별 record로 전환:
• 해당 기간 동안 투여량이 동일
• 투여 간격이 일정 (±허용 범위)
• 그 사이에 공변량 변화 없음 (특히 time-varying)</div>
<div class="code-block"><span class="cm"># 잘못된 접근:</span>

// ── State ──
let checked = {};
try {
  const saved = localStorage.getItem('nm_v71_checked');
  if (saved) checked = JSON.parse(saved);
} catch(e) {}

function save() {
  try { localStorage.setItem('nm_v71_checked', JSON.stringify(checked)); } catch(e) {}
}

// ── Render ──
function render() {
  const container = document.getElementById('phases');
  container.innerHTML = '';

  DATA.forEach(phase => {
    const phaseEl = document.createElement('div');
    phaseEl.className = `phase phase-${phase.phase}`;

    const checkedInPhase = phase.questions.filter(q => checked[q.id]).length;
    const totalInPhase = phase.questions.length;

    phaseEl.innerHTML = `
      <div class="phase-header" onclick="togglePhase(this)">
        <span class="phase-tag">${phase.tag}</span>
        <span class="phase-title">${phase.title} <span style="font-weight:400;color:var(--text-muted);font-size:13px;">— ${phase.subtitle}</span></span>
        <span class="phase-progress">${checkedInPhase}/${totalInPhase}</span>
        <span class="phase-chevron">▾</span>
      </div>
      <div class="phase-body">
        ${phase.questions.map(q => renderQuestion(q)).join('')}
      </div>
    `;

    container.appendChild(phaseEl);
  });

  updateProgress();
}

function renderQuestion(q) {
  const isChecked = checked[q.id];
  const isGate = q.gate;
  const num = q.id.replace('q','Q');

  return `
    <div class="question ${isChecked ? 'checked' : ''} ${isGate ? 'is-gate' : ''}" id="card-${q.id}">
      <div class="q-main" onclick="toggle('${q.id}')">
        <div class="q-check"></div>
        <div class="q-content">
          <div class="q-top">
            <span class="q-number">${num}</span>
            ${isGate ? '<span class="gate-badge">GATE</span>' : ''}
            <span class="q-title">${q.title}</span>
          </div>
          <div class="q-desc">${q.desc}</div>
        </div>
      </div>
      <div class="q-details">
        <div class="q-detail-toggle" onclick="event.stopPropagation(); toggleDetail('${q.id}')">
          ▸ 상세 · 코드 · 판단 기준
        </div>
        <div class="q-detail-body" id="detail-${q.id}">
          ${q.detail}
          <div class="pkg-row">
            ${q.pkgs.map(p => `<span class="pkg-tag">${p}</span>`).join('')}
          </div>
        </div>
      </div>
    </div>
  `;
}

function toggle(id) {
  checked[id] = !checked[id];
  save();
  const card = document.getElementById(`card-${id}`);
  card.classList.toggle('checked', checked[id]);
  updateProgress();
}

function toggleDetail(id) {
  const body = document.getElementById(`detail-${id}`);
  body.classList.toggle('open');
  const toggle = body.previousElementSibling;
  toggle.textContent = body.classList.contains('open') ? '▾ 상세 · 코드 · 판단 기준' : '▸ 상세 · 코드 · 판단 기준';
}

function togglePhase(header) {
  header.parentElement.classList.toggle('collapsed');
}

function updateProgress() {
  const total = DATA.reduce((s, p) => s + p.questions.length, 0);
  const done = Object.values(checked).filter(Boolean).length;
  document.getElementById('progressCount').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = `${(done/total)*100}%`;
}

function resetAll() {
  if (!confirm('모든 체크 상태를 초기화하시겠습니까?')) return;
  checked = {};
  save();
  render();
}

// ── Init ──
render();
