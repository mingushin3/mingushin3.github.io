<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단백결합 PK 시뮬레이터</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script crossorigin src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // 라이브러리에서 필요한 함수들을 꺼내옵니다 (import 대체)
    const { useState } = React;
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell } = window.Recharts;

    function PKSimulator() {
      // 1. 초기 파라미터 상태 설정
      const [r0, setR0] = useState(100);       
      const [clint, setClint] = useState(10);  
      const [fu, setFu] = useState(0.1);       

      // 2. PK 수식에 따른 실시간 농도 계산
      const css = r0 / (fu * clint); 
      const cuss = r0 / clint;       

      // 3. 차트에 주입할 데이터 배열
      const data = [
        { name: '총 농도 (C_ss)', value: parseFloat(css.toFixed(1)), color: '#4A90E2' },
        { name: '유리형 농도 (C_u,ss)', value: parseFloat(cuss.toFixed(1)), color: '#E94E77' }
      ];

      return (
        <div style={{ maxWidth: '600px', margin: '0 auto', padding: '20px', fontFamily: 'sans-serif' }}>
          <h2 style={{ textAlign: 'center', color: '#333' }}>경구 투여: 유리분율(fu) 변화 시뮬레이터</h2>
          
          <div style={{ backgroundColor: '#f5f5f5', padding: '20px', borderRadius: '8px', marginBottom: '20px' }}>
            <div style={{ marginBottom: '15px' }}>
              <label>투여 속도 (R0): {r0}</label>
              <input 
                type="range" min="10" max="500" step="10" 
                value={r0} onChange={(e) => setR0(Number(e.target.value))} 
                style={{ width: '100%', display: 'block' }} 
              />
            </div>
            <div style={{ marginBottom: '15px' }}>
              <label>고유청소율 (Clint): {clint}</label>
              <input 
                type="range" min="1" max="50" step="1" 
                value={clint} onChange={(e) => setClint(Number(e.target.value))} 
                style={{ width: '100%', display: 'block' }} 
              />
            </div>
            <div style={{ marginBottom: '15px' }}>
              <label style={{ fontWeight: 'bold', color: '#d9534f' }}>
                유리분율 (fu): {fu.toFixed(2)}
              </label>
              <input 
                type="range" min="0.01" max="1.0" step="0.01" 
                value={fu} onChange={(e) => setFu(Number(e.target.value))} 
                style={{ width: '100%', display: 'block' }} 
              />
            </div>
          </div>

          <div style={{ height: '300px', width: '100%' }}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={data} margin={{ top: 20, right: 30, left: 20, bottom: 5 }}>
                <XAxis dataKey="name" />
                <YAxis />
                <Tooltip />
                <Bar dataKey="value" radius={[4, 4, 0, 0]}>
                  {data.map((entry, index) => (
                    <Cell key={`cell-${index}`} fill={entry.color} />
                  ))}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>

          <div style={{ marginTop: '20px', textAlign: 'center', fontSize: '18px' }}>
            <p>계산된 총 농도 (Css): <strong>{css.toFixed(2)}</strong></p>
            <p>계산된 유리형 농도 (Cu,ss): <strong>{cuss.toFixed(2)}</strong></p>
          </div>
        </div>
      );
    }

    // 도화지(root)에 컴포넌트를 그립니다.
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PKSimulator />);
  </script>
</body>
</html>
