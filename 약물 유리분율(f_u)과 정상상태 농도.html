<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단백결합 PK 시뮬레이터 (다중 조건 반영)</title>
  <style>
    body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 700px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #2c3e50; font-size: 22px; margin-bottom: 20px; }
    .control-group { margin-bottom: 20px; background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; }
    .control-row { margin-bottom: 15px; transition: opacity 0.3s ease; }
    .control-row:last-child { margin-bottom: 0; }
    label { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; color: #4a5568; }
    select { width: 100%; padding: 8px; font-size: 16px; border-radius: 6px; border: 1px solid #cbd5e0; background-color: white; cursor: pointer; }
    input[type=range] { width: 100%; cursor: pointer; }
    .results { display: flex; justify-content: space-around; margin-top: 15px; padding: 15px; background: #e2e8f0; border-radius: 8px; font-size: 18px; color: #2d3748; }
    .results div { text-align: center; }
    .results strong { display: block; font-size: 24px; margin-top: 5px; }
    .color-css { color: #4A90E2; }
    .color-cuss { color: #E94E77; }
    canvas { display: block; width: 100%; height: 300px; background: #ffebee; border-radius: 8px; border: 2px solid #ffcdd2; margin-top: 20px; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }
    .legend { display: flex; justify-content: center; gap: 20px; margin-top: 10px; font-size: 14px; color: #555; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  </style>
</head>
<body>
  <div class="container">
    <h2>혈중 약물 동태 시뮬레이터 (Eq 2:206-2:213)</h2>
    
    <div class="control-group">
      <div class="control-row">
        <label><span>투여 조건 및 약물 특성</span></label>
        <select id="condition">
          <option value="oral">Oral · 모든 drug</option>
          <option value="iv-low">IV · Low-E drug</option>
          <option value="iv-high">IV · High-E drug</option>
        </select>
      </div>

      <div class="control-row">
        <label id="r0-label"><span>투여 속도 (R0)</span> <span>100</span></label>
        <input type="range" id="r0" min="10" max="500" step="10" value="100">
      </div>
      
      <div class="control-row" id="clint-row">
        <label id="clint-label"><span>고유청소율 (Clint)</span> <span>10</span></label>
        <input type="range" id="clint" min="1" max="50" step="1" value="10">
      </div>

      <div class="control-row" id="qh-row" style="display: none;">
        <label id="qh-label"><span style="color: #2b6cb0;">간혈류량 (Qh)</span> <span>90</span></label>
        <input type="range" id="qh" min="10" max="200" step="5" value="90">
      </div>

      <div class="control-row">
        <label id="fu-label"><span style="color: #d9534f;">유리분율 (fu)</span> <span>0.10</span></label>
        <input type="range" id="fu" min="0.01" max="1.0" step="0.01" value="0.1">
      </div>
    </div>

    <div class="results">
      <div>총 농도 (Css)<strong id="css-val" class="color-css">100.00</strong></div>
      <div>유리형 농도 (Cu,ss)<strong id="cuss-val" class="color-cuss">10.00</strong></div>
    </div>

    <canvas id="simCanvas" width="700" height="300"></canvas>
    
    <div class="legend">
      <div class="legend-item"><span class="dot" style="background: rgba(255, 182, 193, 0.6); border: 2px solid #ff99a8; width:20px; height:20px;"></span> 혈장 단백질</div>
      <div class="legend-item"><span class="dot" style="background: #4A90E2;"></span> 결합 약물</div>
      <div class="legend-item"><span class="dot" style="background: #E94E77;"></span> 유리 약물 (Cu,ss)</div>
    </div>
  </div>

  <script>
    const conditionSelect = document.getElementById('condition');
    const r0Input = document.getElementById('r0');
    const clintInput = document.getElementById('clint');
    const qhInput = document.getElementById('qh');
    const fuInput = document.getElementById('fu');
    
    const clintRow = document.getElementById('clint-row');
    const qhRow = document.getElementById('qh-row');

    const r0Label = document.querySelector('#r0-label span:last-child');
    const clintLabel = document.querySelector('#clint-label span:last-child');
    const qhLabel = document.querySelector('#qh-label span:last-child');
    const fuLabel = document.querySelector('#fu-label span:last-child');
    
    const cssVal = document.getElementById('css-val');
    const cussVal = document.getElementById('cuss-val');

    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    let proteins = [];
    let freeDrugs = [];
    let boundDrugs = [];
    const MAX_VISUAL_PARTICLES = 800;

    class Protein {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.radius = 18;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 182, 193, 0.4)';
        ctx.fill();
        ctx.strokeStyle = '#ff99a8';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    class Drug {
      constructor(isFree, targetProtein = null) {
        this.isFree = isFree;
        this.radius = 3.5;
        if (this.isFree) {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.vx = (Math.random() - 0.5) * 2.5;
          this.vy = (Math.random() - 0.5) * 2.5;
        } else {
          this.protein = targetProtein;
          this.angle = Math.random() * Math.PI * 2;
          this.updatePositionToProtein();
        }
      }
      updatePositionToProtein() {
        if(this.protein) {
          this.x = this.protein.x + Math.cos(this.angle) * (this.protein.radius + 1);
          this.y = this.protein.y + Math.sin(this.angle) * (this.protein.radius + 1);
        }
      }
      update() {
        if (this.isFree) {
          this.x += this.vx;
          this.y += this.vy;
          if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
          if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        } else {
          this.angle += 0.02;
          this.updatePositionToProtein();
        }
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.isFree ? '#E94E77' : '#4A90E2';
        ctx.fill();
      }
    }

    for (let i = 0; i < 15; i++) {
      proteins.push(new Protein(Math.random() * canvas.width, Math.random() * canvas.height));
    }

    function toggleInputs() {
      if (conditionSelect.value === 'iv-high') {
        qhRow.style.display = 'flex';
        clintRow.style.display = 'none';
      } else {
        qhRow.style.display = 'none';
        clintRow.style.display = 'flex';
      }
      updateSimulationParams();
    }

    function updateSimulationParams() {
      const condition = conditionSelect.value;
      const r0 = parseFloat(r0Input.value);
      const clint = parseFloat(clintInput.value);
      const qh = parseFloat(qhInput.value);
      const fu = parseFloat(fuInput.value);

      r0Label.innerText = r0;
      clintLabel.innerText = clint;
      qhLabel.innerText = qh;
      fuLabel.innerText = fu.toFixed(2);

      let css, cuss;

      // 이미지 표의 조건별 수식 적용
      if (condition === 'iv-high') {
        css = r0 / qh;
        cuss = fu * (r0 / qh);
      } else {
        // 'iv-low' 및 'oral'은 동일한 근사 수식 적용
        css = r0 / (fu * clint);
        cuss = r0 / clint;
      }

      cssVal.innerText = css.toFixed(2);
      cussVal.innerText = cuss.toFixed(2);

      let scaleFactor = 1;
      if (css > MAX_VISUAL_PARTICLES) scaleFactor = MAX_VISUAL_PARTICLES / css;

      // 시각적 방어코드: css나 cuss가 음수 또는 NaN이 되지 않도록 처리
      const targetFreeCount = Math.max(0, Math.round((cuss || 0) * scaleFactor));
      const targetBoundCount = Math.max(0, Math.round(((css || 0) - (cuss || 0)) * scaleFactor));

      while (freeDrugs.length < targetFreeCount) freeDrugs.push(new Drug(true));
      while (freeDrugs.length > targetFreeCount) freeDrugs.pop();

      while (boundDrugs.length < targetBoundCount) {
        const randomProtein = proteins[Math.floor(Math.random() * proteins.length)];
        boundDrugs.push(new Drug(false, randomProtein));
      }
      while (boundDrugs.length > targetBoundCount) boundDrugs.pop();
    }

    function animate() {
      ctx.fillStyle = 'rgba(255, 235, 238, 0.4)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      proteins.forEach(p => { p.update(); p.draw(); });
      boundDrugs.forEach(d => { d.update(); d.draw(); });
      freeDrugs.forEach(d => { d.update(); d.draw(); });
      requestAnimationFrame(animate);
    }

    conditionSelect.addEventListener('change', toggleInputs);
    r0Input.addEventListener('input', updateSimulationParams);
    clintInput.addEventListener('input', updateSimulationParams);
    qhInput.addEventListener('input', updateSimulationParams);
    fuInput.addEventListener('input', updateSimulationParams);

    toggleInputs();
    animate();
  </script>
</body>
</html>
